name: Rodar Zapgr Bot

on:
  workflow_dispatch:

concurrency:
  group: zapgr-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Mostrar versao do codigo
        run: |
          echo "Commit atual: $GITHUB_SHA"
          echo "Branch atual: $GITHUB_REF_NAME"
          echo "Modelo configurado no bot.py:"
          grep -n "GEMINI_MODEL" bot.py || true
          grep -n "gemini-" bot.py || true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py
