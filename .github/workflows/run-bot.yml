name: Rodar Zapgr Bot
run-name: Rodar Zapgr Bot (${{ github.ref_name }})

on:
  workflow_dispatch:

concurrency:
  group: zapgr-bot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Diagnostico de workflows no checkout
        run: |
          echo "Workflow em execucao: $GITHUB_WORKFLOW"
          echo "Arquivo de workflow: $GITHUB_WORKFLOW_REF"
          echo "Ref do checkout: $GITHUB_REF_NAME"
          find .github/workflows -maxdepth 1 -type f -name '*.yml' -o -name '*.yaml' | sort

      - name: Mostrar versao do codigo
        run: |
          echo "Commit atual: $GITHUB_SHA"
          echo "Branch atual: $GITHUB_REF_NAME"
          echo "Modelo configurado no bot.py:"
          grep -n "GEMINI_MODEL" bot.py || true
          grep -n "gemini-" bot.py || true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: python bot.py
