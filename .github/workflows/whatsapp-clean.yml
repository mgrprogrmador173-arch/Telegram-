name: Rodar WhatsApp Limpo

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: whatsapp-clean
  cancel-in-progress: false

jobs:
  whatsapp-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Restaurar login
        uses: actions/cache@v4
        with:
          path: |
            .wwebjs_auth
            .wwebjs_cache
            chat-history
          key: whatsapp-data-${{ runner.os }}-${{ github.repository }}
          restore-keys: |
            whatsapp-data-${{ runner.os }}-
            whatsapp-login-${{ runner.os }}-

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias do zero
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm install whatsapp-web.js@latest
          npm list whatsapp-web.js groq-sdk google-tts-api --depth=0

      - name: Instalar FFmpeg
        run: |
          if command -v ffmpeg >/dev/null 2>&1; then
            echo "FFmpeg ja instalado"
          else
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Iniciar bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_CHAT_MODEL: llama-3.1-8b-instant
          GROQ_TRANSCRIBE_MODEL: whisper-large-v3-turbo
          QR_DIR: qr-code
          CHAT_HISTORY_DIR: chat-history
          WHATSAPP_PAIRING_NUMBER: ${{ secrets.WHATSAPP_PAIRING_NUMBER }}
          QR_INTERVAL_SECONDS: 90
          PHONE_AFTER_QR_DELAY_SECONDS: 30
          TTS_SPEED: '1.5'
        run: |
          mkdir -p qr-code tmp-audio .wwebjs_auth .wwebjs_cache chat-history
          node whatsapp_groq_voice_fixed.js
