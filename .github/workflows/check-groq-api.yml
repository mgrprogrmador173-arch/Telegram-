name: Verificar API Groq

on:
  workflow_dispatch:

jobs:
  check-groq-api:
    runs-on: ubuntu-latest

    steps:
      - name: Verificar secret
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "ERRO: GROQ_API_KEY nao esta configurada nos Secrets."
            exit 1
          fi
          echo "GROQ_API_KEY encontrada nos Secrets."

      - name: Verificar modelos disponiveis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          STATUS=$(curl -s -o models.json -w "%{http_code}" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            https://api.groq.com/openai/v1/models)

          echo "Status da API de modelos: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "ERRO: A chave da Groq nao foi aceita ou a API nao respondeu corretamente."
            cat models.json
            exit 1
          fi

          echo "API da Groq respondeu corretamente."
          grep -o '"id":"[^"]*"' models.json | head -20 || true

      - name: Testar resposta do modelo
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          STATUS=$(curl -s -o response.json -w "%{http_code}" \
            https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"llama-3.1-8b-instant","messages":[{"role":"user","content":"Responda apenas: OK"}],"max_tokens":5}')

          echo "Status do teste de chat: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "ERRO: O modelo de chat nao respondeu corretamente."
            cat response.json
            exit 1
          fi

          echo "Teste de chat concluido com sucesso."
          cat response.json
