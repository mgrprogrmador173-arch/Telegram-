name: Rodar WhatsApp Web JS

on:
  workflow_dispatch:

concurrency:
  group: whatsapp-webjs
  cancel-in-progress: true

jobs:
  whatsapp-webjs:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Rodar WhatsApp Web JS
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_AI_MODEL: gemini-2.5-flash-lite
          QR_DIR: qr-code
        run: npm run start:whatsapp &

      - name: Aguardar QR Code
        run: |
          for i in {1..60}; do
            if [ -f qr-code/whatsapp-qr.png ]; then
              echo "QR Code gerado."
              exit 0
            fi
            echo "Aguardando QR Code..."
            sleep 3
          done
          echo "QR Code nao foi gerado dentro do tempo esperado."
          exit 1

      - name: Exportar QR Code
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-qr-code
          path: qr-code/

      - name: Manter bot rodando
        run: |
          echo "Bot rodando. Baixe o artifact whatsapp-qr-code e escaneie o arquivo whatsapp-qr.png."
          sleep 21000
