name: Rodar WhatsApp Web JS

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: whatsapp-webjs
  cancel-in-progress: true

jobs:
  whatsapp-webjs:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Iniciar bot em segundo plano
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_AI_MODEL: gemini-2.5-flash-lite
          QR_DIR: qr-code
          FORCE_QR_MODE: 'true'
        run: |
          mkdir -p qr-code
          echo "Iniciando WhatsApp Web JS em modo QR direto..."
          nohup npm run start:whatsapp > whatsapp.log 2>&1 &
          echo $! > whatsapp.pid
          echo "PID do bot: $(cat whatsapp.pid)"

      - name: Aguardar QR PNG
        run: |
          echo "Aguardando qr-code/qr-latest.png..."
          for i in {1..120}; do
            if [ -f qr-code/qr-latest.png ]; then
              echo "QR PNG gerado."
              cat whatsapp.log || true
              exit 0
            fi
            echo "Aguardando... tentativa $i/120"
            tail -n 25 whatsapp.log || true
            sleep 2
          done
          echo "Nao gerou QR PNG dentro do tempo esperado."
          cat whatsapp.log || true
          exit 1

      - name: Publicar QR PNG no repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add qr-code/*.png
          git commit -m "Update WhatsApp QR code" || echo "Sem alteracoes para commitar"
          git pull --rebase || true
          git push || true

      - name: Mostrar link direto
        run: |
          echo "## QR Code direto" >> $GITHUB_STEP_SUMMARY
          echo "Abra este link no celular:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "https://raw.githubusercontent.com/mgrprogrmador173-arch/Telegram-/main/qr-code/qr-latest.png" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Se a imagem nao atualizar, feche e abra o link novamente." >> $GITHUB_STEP_SUMMARY

      - name: Manter bot rodando
        run: |
          echo "Bot rodando. Abra o QR direto:"
          echo "https://raw.githubusercontent.com/mgrprogrmador173-arch/Telegram-/main/qr-code/qr-latest.png"
          tail -f whatsapp.log &
          sleep 21000
