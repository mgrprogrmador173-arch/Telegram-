name: Rodar WhatsApp Web JS

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: whatsapp-webjs
  cancel-in-progress: true

jobs:
  whatsapp-webjs:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Restaurar login e historico
        uses: actions/cache@v4
        with:
          path: |
            .wwebjs_auth
            .wwebjs_cache
            chat-history
          key: whatsapp-data-${{ runner.os }}-${{ github.repository }}
          restore-keys: |
            whatsapp-data-${{ runner.os }}-
            whatsapp-login-${{ runner.os }}-

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Ativar historico local
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('whatsapp_groq_voice.js')
          s = p.read_text()
          if "require('./chat_history')" not in s:
              s = s.replace("const { Client, LocalAuth, MessageMedia } = require('whatsapp-web.js');", "const { Client, LocalAuth, MessageMedia } = require('whatsapp-web.js');\nconst { saveChatMessage } = require('./chat_history');")
          if "saveChatMessage({ userId: id, direction: 'in'" not in s:
              s = s.replace("async function answer(id, text) {\n", "async function answer(id, text) {\n  saveChatMessage({ userId: id, direction: 'in', type: 'text', text });\n")
          if "saveChatMessage({ userId: id, direction: 'out'" not in s:
              s = s.replace("  addMem(id, `MGR: ${out}`);\n  return out;", "  addMem(id, `MGR: ${out}`);\n  saveChatMessage({ userId: id, direction: 'out', type: 'text', text: out });\n  return out;")
          p.write_text(s)
          PY

      - name: Testar proxy
        env:
          WHATSAPP_PROXY_SERVER: ${{ secrets.WHATSAPP_PROXY_SERVER }}
        run: |
          if [ -z "$WHATSAPP_PROXY_SERVER" ]; then
            echo "Proxy nao configurado. Rodando sem proxy."
            echo "PROXY_OK=false" >> $GITHUB_ENV
            exit 0
          fi
          echo "Proxy configurado. Testando acesso ao WhatsApp Web..."
          if curl -I -L --max-time 15 --proxy "$WHATSAPP_PROXY_SERVER" https://web.whatsapp.com >/dev/null 2>&1; then
            echo "Proxy OK. O bot vai usar o proxy."
            echo "PROXY_OK=true" >> $GITHUB_ENV
          else
            echo "Proxy falhou ou demorou demais. O bot vai rodar sem proxy."
            echo "PROXY_OK=false" >> $GITHUB_ENV
          fi

      - name: Iniciar bot com Groq e voz
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_CHAT_MODEL: llama-3.1-8b-instant
          GROQ_TRANSCRIBE_MODEL: whisper-large-v3-turbo
          QR_DIR: qr-code
          CHAT_HISTORY_DIR: chat-history
          WHATSAPP_PAIRING_NUMBER: ${{ secrets.WHATSAPP_PAIRING_NUMBER }}
          SECRET_PROXY: ${{ secrets.WHATSAPP_PROXY_SERVER }}
          QR_INTERVAL_SECONDS: 90
          PHONE_AFTER_QR_DELAY_SECONDS: 30
          TTS_SPEED: '1.5'
        run: |
          mkdir -p qr-code tmp-audio .wwebjs_auth .wwebjs_cache chat-history
          if [ "$PROXY_OK" = "true" ]; then
            export WHATSAPP_PROXY_SERVER="$SECRET_PROXY"
            echo "Iniciando bot com proxy."
          else
            unset WHATSAPP_PROXY_SERVER
            echo "Iniciando bot sem proxy."
          fi
          nohup node whatsapp_groq_voice.js > whatsapp.log 2>&1 &
          echo $! > whatsapp.pid
          echo "Bot iniciado com Groq, reconhecimento, resposta por voz e historico local"

      - name: Publicar QR atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          LAST_UPDATE=""
          for i in {1..1200}; do
            if [ -f qr-code/qr-latest.png ]; then
              CURRENT_UPDATE=$(cat qr-code/qr-updated.txt 2>/dev/null || echo "")
              if [ "$CURRENT_UPDATE" != "$LAST_UPDATE" ]; then
                LAST_UPDATE="$CURRENT_UPDATE"
                git pull --rebase || true
                git add qr-code/*.png qr-code/*.txt || true
                if ! git diff --cached --quiet; then
                  git commit -m "Update WhatsApp QR"
                  git push || (sleep 5 && git pull --rebase && git push)
                else
                  echo "Sem mudanca nova no QR"
                fi
                echo "QR publicado: https://raw.githubusercontent.com/mgrprogrmador173-arch/Telegram-/main/qr-code/qr-latest.png"
              fi
            fi
            if grep -q "Bot conectado" whatsapp.log 2>/dev/null; then
              echo "WhatsApp conectado"
              break
            fi
            tail -n 30 whatsapp.log || true
            sleep 15
          done

      - name: Mostrar link direto
        run: |
          echo "## QR Code direto" >> $GITHUB_STEP_SUMMARY
          echo "https://raw.githubusercontent.com/mgrprogrmador173-arch/Telegram-/main/qr-code/qr-latest.png" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Login e historico local serao salvos no cache quando o workflow finalizar normalmente." >> $GITHUB_STEP_SUMMARY

      - name: Manter bot rodando
        run: |
          echo "Bot rodando com Groq, voz e historico local"
          echo "https://raw.githubusercontent.com/mgrprogrmador173-arch/Telegram-/main/qr-code/qr-latest.png"
          tail -f whatsapp.log &
          sleep 21000
