name: Rodar WhatsApp Web JS

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: whatsapp-webjs
  cancel-in-progress: true

jobs:
  whatsapp-webjs:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Iniciar bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_AI_MODEL: gemini-2.5-flash-lite
          QR_DIR: qr-code
          WHATSAPP_PAIRING_NUMBER: ${{ secrets.WHATSAPP_PAIRING_NUMBER }}
          WHATSAPP_PROXY_SERVER: ${{ secrets.WHATSAPP_PROXY_SERVER }}
          QR_INTERVAL_SECONDS: 60
        run: |
          mkdir -p qr-code
          nohup node whatsapp_web_loop.js > whatsapp.log 2>&1 &
          echo $! > whatsapp.pid
          echo "Bot iniciado"

      - name: Publicar QR atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          LAST_UPDATE=""
          for i in {1..1200}; do
            if [ -f qr-code/qr-latest.png ]; then
              CURRENT_UPDATE=$(cat qr-code/qr-updated.txt 2>/dev/null || echo "")
              if [ "$CURRENT_UPDATE" != "$LAST_UPDATE" ]; then
                LAST_UPDATE="$CURRENT_UPDATE"
                git pull --rebase || true
                git add qr-code/*.png qr-code/*.txt || true
                if ! git diff --cached --quiet; then
                  git commit -m "Update WhatsApp QR"
                  git push || (sleep 5 && git pull --rebase && git push)
                else
                  echo "Sem mudanca nova no QR"
                fi
                echo "QR publicado: https://raw.githubusercontent.com/mgrprogrmador173-arch/Telegram-/main/qr-code/qr-latest.png"
              fi
            fi
            if grep -q "Bot conectado" whatsapp.log 2>/dev/null; then
              echo "WhatsApp conectado"
              break
            fi
            tail -n 30 whatsapp.log || true
            sleep 10
          done

      - name: Mostrar link direto
        run: |
          echo "## QR Code direto" >> $GITHUB_STEP_SUMMARY
          echo "https://raw.githubusercontent.com/mgrprogrmador173-arch/Telegram-/main/qr-code/qr-latest.png" >> $GITHUB_STEP_SUMMARY

      - name: Manter bot rodando
        run: |
          echo "Bot rodando"
          echo "https://raw.githubusercontent.com/mgrprogrmador173-arch/Telegram-/main/qr-code/qr-latest.png"
          tail -f whatsapp.log &
          sleep 21000
