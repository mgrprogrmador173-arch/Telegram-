name: Testar WhatsApp no GitHub

on:
  workflow_dispatch:

concurrency:
  group: whatsapp-test
  cancel-in-progress: true

jobs:
  whatsapp-test:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Baixar cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared

      - name: Iniciar bot WhatsApp
        env:
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_AI_MODEL: gemma-3-27b-it
          TTS_SPEED: '1.5'
          PORT: 8080
        run: |
          python whatsapp_test.py > flask.log 2>&1 &
          sleep 5
          ./cloudflared tunnel --url http://localhost:8080 2>&1 | tee cloudflared.log &
          sleep 12
          echo ""
          echo "============================================================"
          echo "URL TEMPORARIA DO WHATSAPP:"
          grep -o 'https://[-a-zA-Z0-9.]*trycloudflare.com' cloudflared.log | head -n 1 || true
          echo ""
          echo "USE NA META ASSIM:"
          URL=$(grep -o 'https://[-a-zA-Z0-9.]*trycloudflare.com' cloudflared.log | head -n 1 || true)
          if [ -n "$URL" ]; then echo "$URL/webhook"; fi
          echo "============================================================"
          echo ""
          echo "Logs do Flask:"
          cat flask.log || true
          wait
